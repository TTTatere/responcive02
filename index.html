<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まちなかキャラクター</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>まちなかキャラクター</h1>

    <div class="buttons">
        <button onclick="filterGallery('all')">すべて</button>
        <button onclick="filterGallery('residential')">住宅街</button>
        <button onclick="filterGallery('urban')">都市部</button>
        <button onclick="filterGallery('roadside')">郊外</button>
    </div>
</header>

<main id="gallery">

    <div class="card residential">
        <img src="images/peko.jpg">
        <h2>住宅街キャラA</h2>
        <p>パン屋の看板キャラ</p>
    </div>

    <div class="card residential">
        <img src="images/cat.jpg">
        <h2>住宅街キャラB</h2>
        <p>商店街の猫</p>
    </div>

    <div class="card urban">
        <img src="images/colonel.jpg">
        <h2>都市部キャラA</h2>
        <p>ファストフード系</p>
    </div>

    <div class="card roadside">
        <img src="images/yellowhat.jpg">
        <h2>郊外キャラA</h2>
        <p>カー用品店キャラ</p>
    </div>

</main>

<script src="script.js"></script>
</body>
</html>
