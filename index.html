<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>まちなかキャラクター</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>企業キャラクター図鑑</h1>
    <p>住宅街・都市部・郊外ロードサイド別に分類</p>

    <input
        type="text"
        id="searchBox"
        placeholder="キャラクター名や企業名で検索..."
    >
</header>

<nav>
    <button onclick="filterCards('all')">すべて</button>
    <button onclick="filterCards('residential')">住宅街</button>
    <button onclick="filterCards('urban')">都市部</button>
    <button onclick="filterCards('roadside')">郊外</button>
</nav>

<main id="gallery">

    <div class="card residential">
        <img src="images/peko.jpg" alt="">
        <h2></h2>
        <p></p>
        <span class="tag residential-tag">住宅街</span>
    </div>

    <div class="card urban">
        <img src="images/colonel.jpg" alt="">
        <h2></h2>
        <p>KFC</p>
        <span class="tag urban-tag">都市部</span>
    </div>

    <div class="card roadside">
        <img src="images/yellowhat.jpg" alt="">
        <h2></h2>
        <p></p>
        <span class="tag roadside-tag">郊外</span>
    </div>

</main>

<script src="script.js"></script>

</body>
</html>
